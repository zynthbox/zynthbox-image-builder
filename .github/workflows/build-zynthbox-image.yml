name: Build zynthbox image

on:
  workflow_dispatch:
    inputs:
      aptly_repo:
        description: 'Aptly repo to build image with'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - unstable
      release:
        description: 'Release to build for'
        required: true
        default: 'trixie'
        type: choice
        options:
          - trixie
      # Add the feature branch names in the list to allow building from other branches
      zynthboxos_branch_name  :
        description: 'ZynthboxOS Branch Name'
        default: 'main'
        type: choice
        options:
          - main
          - unstable
      custompios_branch_name:
        description: 'CustomPiOS Branch Name'
        default: 'main'
        type: choice
        options:
          - main
          - unstable

jobs:
  build:
    name: Build zynthbox image
    runs-on: ubuntu-24.04-arm
    env:
      APTLY_REPO: ${{ github.event.inputs.aptly_repo }}
      RELEASE: ${{ github.event.inputs.release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Install dependencies
        run: |
          set -x
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Build image
        run: |
          set -x

          # Set image build date time to zynthboxos config
          ZYNTHBOXOS_IMAGE_BUILD_DATETIME=$(date -u +%Y-%m-%d_%H%M)
          image_name="$ZYNTHBOXOS_IMAGE_BUILD_DATETIME-zynthboxos-${APTLY_REPO}-${RELEASE}-arm64.img"
          log_file_name="$image_name.build.log"
          mountdir=$(mktemp -d)

          # Ensuring key security
          mkdir -p ~/.ssh
          echo "${{ secrets.HOST_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{secrets.HOSTNAME}} >> ~/.ssh/known_hosts

          # Update and install dependencies
          echo "# Update and install dependencies"
          sudo apt-get update
          sudo apt-get install -y coreutils p7zip-full qemu-user-static sudo git wget curl python3 lsof fdisk xz-utils openssh-client jq zip binutils

          # Clone repositories required to generate zynthbox image
          echo "# Clone repositories required to generate zynthbox image"
          git clone -b ${{ github.event.inputs.custompios_branch_name }} https://github.com/zynthbox/CustomPiOS.git
          git clone -b ${{ github.event.inputs.zynthboxos_branch_name }} https://github.com/zynthbox/ZynthboxOS.git

          # Download raspios base image
          wget -c --trust-server-names 'https://${{secrets.HOSTNAME}}/${{secrets.BASE_DEVUAN_IMAGE_PATH}}'
          mv ./*-devuan-excalibur-*.img.xz ./ZynthboxOS/src/image

          # Setup Zynthbox Repo sourceline
          echo "# Setup Zynthbox Repo sourceline"
          echo "ZYNTHBOXOS_ZYNTHBOX_REPO_KEY_URL='https://repo.zynthbox.io/repo_key.pub'" >> ZynthboxOS/src/modules/zynthboxos/config
          echo "ZYNTHBOXOS_ZYNTHBOX_REPO_SOURCELINE='deb http://repo.zynthbox.io/${APTLY_REPO}-${RELEASE} $RELEASE main'" >> ZynthboxOS/src/modules/zynthboxos/config

          # Add testing sourceline if building unstable image
          # Since unstable repo will only contain those packages with experimental or breaking changes. 
          # Other required packages needs to be pulled from the testing repo so adding the testing sourceline as well to avoid build failure due to missing dependencies.
          # The package verison in unstable repo will always be higher than the testing repo, so it will not cause any issue for stable image build.
          # Setup unstable repo sourceline conditionally
          if [ "$APTLY_REPO" = "unstable" ]; then
            echo "# Setup Zynthbox unstable repo sourceline"
            echo "ZYNTHBOXOS_UNSTABLE_REPO_KEY_URL='https://repo.zynthbox.io/repo_key.pub'" >> ZynthboxOS/src/modules/zynthboxos/config
            echo "ZYNTHBOXOS_UNSTABLE_REPO_SOURCELINE='deb http://repo.zynthbox.io/testing-${RELEASE} $RELEASE main'" >> ZynthboxOS/src/modules/zynthboxos/config
          fi

          # Set image build date time to zynthboxos config
          echo "ZYNTHBOXOS_IMAGE_BUILD_DATETIME=$ZYNTHBOXOS_IMAGE_BUILD_DATETIME" >> ZynthboxOS/src/modules/zynthboxos/config

          # Build zynthbox image
          echo "# Building zynthbox image"
          cd ./ZynthboxOS/src
          ../../CustomPiOS/src/update-custompios-paths
          sudo bash -x ./build_dist
          sudo mv ./workspace/*.img ./workspace/$image_name
          echo "Image Size -> $(du -h ./workspace/$image_name)"

          # Compress image with xz and push
          echo "# Pushing compressed image"
          sudo xz -zv --threads=12 --memory=100% ./workspace/$image_name -c | ssh -i ~/.ssh/id_rsa -o "StrictHostKeyChecking no" ${{secrets.USERNAME}}@${{secrets.HOSTNAME}} "cat > ${{secrets.IMAGE_PATH}}/$image_name.xz"
          ssh -i ~/.ssh/id_rsa -o "StrictHostKeyChecking no" \
            "${{secrets.USERNAME}}@${{secrets.HOSTNAME}}" \
            "cd ${{secrets.IMAGE_PATH}} && md5sum $image_name.xz > $image_name.xz.md5sum.txt"

